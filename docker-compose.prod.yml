services:
  init:
    image: ghcr.io/redkeysh/spokane.markets:init
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.local
    restart: "no"

  cron:
    image: ghcr.io/redkeysh/spokane.markets:init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '0 9 * * 1 cd /app && npx tsx scripts/weekly-digest.ts' > /tmp/crontab
        echo '0 8 * * * cd /app && npx tsx scripts/filter-alerts.ts' >> /tmp/crontab
        echo '0 2 * * * /app/scripts/pg-backup.sh >> /proc/1/fd/1 2>&1' >> /tmp/crontab
        crontab /tmp/crontab
        exec crond -f -l 2
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/redkeysh/spokane.markets:latest
    env_file: .env.local
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    # `deploy.resources` is ignored by `docker compose up` (non-Swarm). Use these so limits apply.
    mem_limit: 1g
    cpus: 1.0
    # In production, `docker compose up -d` (without --build) pulls the image.
    # The base `build` key is ignored when pulling a pre-built image.

  db:
    restart: unless-stopped
    ports: !reset
    # DB port not exposed to host in production; access via internal network only.
    mem_limit: 512m
    cpus: 1.0

  caddy:
    restart: unless-stopped
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    mem_limit: 256m
    cpus: 0.5