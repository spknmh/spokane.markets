services:
  init:
    image: ghcr.io/redkeysh/spokane.markets:init
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.local
    restart: "no"

  web:
    image: ghcr.io/redkeysh/spokane.markets:latest
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    # In production, `docker compose up -d` (without --build) pulls the image.
    # The base `build` key is ignored when pulling a pre-built image.

  db:
    restart: unless-stopped
    ports: !reset
    # DB port not exposed to host in production; access via internal network only.

  caddy:
    restart: unless-stopped
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
