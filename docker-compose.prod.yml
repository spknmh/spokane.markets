services:
  init:
    image: ghcr.io/spknmh/spokane.markets:init
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.local
    restart: "no"

  cron:
    image: ghcr.io/spknmh/spokane.markets:init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '0 9 * * 1 cd /app && npx tsx scripts/weekly-digest.ts' > /tmp/crontab
        echo '0 8 * * * cd /app && npx tsx scripts/filter-alerts.ts' >> /tmp/crontab
        echo '0 2 * * * /app/scripts/pg-backup.sh >> /proc/1/fd/1 2>&1' >> /tmp/crontab
        crontab /tmp/crontab
        exec crond -f -l 2
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/spknmh/spokane.markets:latest
    env_file: .env.local
    environment:
      # Pin V8 old-space heap so Node doesn't OOM inside the cgroup.
      # Rule of thumb: ~75% of mem_limit. Leave headroom for sharp, libuv, and Next's worker pool.
      #   mem_limit: 2g  → --max-old-space-size=1536
      #   mem_limit: 4g  → --max-old-space-size=3072
      NODE_OPTIONS: "--max-old-space-size=1536"
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    # `deploy.resources` is ignored by `docker compose up` (non-Swarm). Use these so limits apply.
    mem_limit: 2g
    cpus: 2.0
    # In production, `docker compose up -d` (without --build) pulls the image.
    # The base `build` key is ignored when pulling a pre-built image.

  db:
    restart: unless-stopped
    ports: !reset
    # DB port not exposed to host in production; access via internal network only.
    mem_limit: 512m
    cpus: 1.0