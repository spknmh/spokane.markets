# Isolated reverse proxy — runs independently of the app stack (restart app without touching Caddy).
# From repo root:
#   docker compose -f caddy/docker-compose.yml up -d
# Production (ports 80/443):
#   docker compose -f caddy/docker-compose.yml -f caddy/docker-compose.prod.yml up -d
#
# Requires external network `webapp`. The app `web` service must join `webapp` so this Caddyfile can resolve `web`.
# UPLOADS_VOLUME_NAME: override if `docker volume ls` shows a different name for the app uploads volume (default: spokanemarkets_uploads_data).

name: spokane-caddy

services:
  caddy:
    image: caddy:2-alpine
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - webapp
    ports:
      - "8080:80/tcp"
      - "8443:443/tcp"
      - "8443:443/udp"
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - uploads_data:/srv/uploads:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  webapp:
    external: true

volumes:
  # Created under the old app project name; mark external so spokane-caddy reuses them without warnings.
  caddy_data:
    external: true
    name: spokanemarkets_caddy_data
  caddy_config:
    external: true
    name: spokanemarkets_caddy_config
  uploads_data:
    external: true
    name: ${UPLOADS_VOLUME_NAME:-spokanemarkets_uploads_data}
