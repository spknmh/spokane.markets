name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  IMAGE_INIT: ghcr.io/${{ github.repository }}:init-${{ github.sha }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: spokane.market
    permissions:
      contents: read
      packages: write
    env:
      # Prisma generate needs DATABASE_URL to exist (does not connect); use placeholder for CI
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          SA_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          UMAMI_ID: ${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          UMAMI_URL: ${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
        run: |
          missing=""
          [ -z "$SA_KEY" ] && missing="$missing NEXT_SERVER_ACTIONS_ENCRYPTION_KEY"
          [ -z "$APP_URL" ] && missing="$missing NEXT_PUBLIC_APP_URL"
          if [ -n "$missing" ]; then
            echo "::error::Required secrets not set:$missing"
            echo "Add them in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$UMAMI_ID" ]; then echo "::warning::NEXT_PUBLIC_UMAMI_WEBSITE_ID not set - Umami will be disabled in the client bundle"; fi
          if [ -z "$GTM_ID" ]; then echo "::notice::NEXT_PUBLIC_GTM_ID not set - GTM will be disabled"; fi
          if [ -z "$MAPBOX_TOKEN" ]; then echo "::notice::NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN not set - address autofill will be disabled"; fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
            NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          secrets: |
            "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}"
          tags: |
            ${{ env.IMAGE }}
            ghcr.io/${{ github.repository }}:latest

      - name: Build and push init image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: init
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
            NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          secrets: |
            "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}"
          tags: |
            ${{ env.IMAGE_INIT }}
            ghcr.io/${{ github.repository }}:init
