name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  IMAGE_INIT: ghcr.io/${{ github.repository }}:init-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}" ] && missing="$missing NEXT_SERVER_ACTIONS_ENCRYPTION_KEY"
          [ -z "${{ secrets.NEXT_PUBLIC_APP_URL }}" ] && missing="$missing NEXT_PUBLIC_APP_URL"
          if [ -n "$missing" ]; then
            echo "::error::Required secrets not set:$missing"
            echo "Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Optional analytics — warn if missing (build will proceed with empty values)
          [ -z "${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}" ] && echo "::warning::NEXT_PUBLIC_UMAMI_WEBSITE_ID not set — Umami will be disabled in the client bundle"
          [ -z "${{ secrets.NEXT_PUBLIC_GTM_ID }}" ] && echo "::notice::NEXT_PUBLIC_GTM_ID not set — GTM will be disabled"
          echo "Build args status:"
          echo "  NEXT_PUBLIC_UMAMI_WEBSITE_ID: $([ -n \"${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}\" ] && echo 'set' || echo 'NOT SET')"
          echo "  NEXT_PUBLIC_UMAMI_SCRIPT_URL: $([ -n \"${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}\" ] && echo 'set' || echo 'NOT SET')"
          echo "  NEXT_PUBLIC_GTM_ID: $([ -n \"${{ secrets.NEXT_PUBLIC_GTM_ID }}\" ] && echo 'set' || echo 'NOT SET')"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
          secrets: |
            "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}"
          tags: |
            ${{ env.IMAGE }}
            ghcr.io/${{ github.repository }}:latest

      - name: Build and push init image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: init
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
          secrets: |
            "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}"
          tags: |
            ${{ env.IMAGE_INIT }}
            ghcr.io/${{ github.repository }}:init
