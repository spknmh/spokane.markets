services:
  db:
    image: postgres:16-alpine
    env_file: .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  init:
    build:
      context: .
      target: init
      args:
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.local
    restart: "no"
    volumes:
      - ./uploads:/app/uploads

  web:
    build:
      context: .
      target: runner
      args:
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    env_file: .env.local
    volumes:
      - ./uploads:/app/uploads

  caddy:
    image: caddy:2-alpine
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - web
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./uploads:/srv/uploads:ro

volumes:
  pgdata:
  caddy_data:
  caddy_config:
