services:
  db:
    image: postgres:16-alpine
    env_file: .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  init:
    build:
      context: .
      target: init
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN:-}
      secrets:
        - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.local
    restart: "no"
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN:-}
      secrets:
        - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      # Docker sets HOSTNAME to the container ID; Next.js binds to it, so nothing listens on 127.0.0.1 (healthcheck/Caddy).
      HOSTNAME: "0.0.0.0"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default: {}
      # The standalone Caddy at /opt/caddy reverse-proxies to this exact alias.
      # Do NOT remove or rename it without coordinating with the Caddy operator —
      # short names like `web` collide with other apps on the shared `webapp`
      # network and route non-deterministically.
      webapp:
        aliases:
          - spokane-markets-web

secrets:
  NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:
    environment: "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY"

networks:
  webapp:
    external: true

volumes:
  pgdata:
  uploads_data:
